# Powerline
set-option -g status-left-length 100
set-option -g status-right-length 200
run-shell "powerline-daemon -q"
source "/opt/homebrew/lib/python3.13/site-packages/powerline/bindings/tmux/powerline.conf"

# Set prefix to Ctrl-Q
set-option -g prefix C-q

# Set xterm as default terminal
set -g default-terminal "screen-256color"
set -g xterm-keys on

# VI-mode for yanking
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
# No delay on pressing escape key
set -sg escape-time 0

# Switch panes only once per command. No '-r' option
bind-key Up    select-pane -U
bind-key Down  select-pane -D
bind-key Left  select-pane -L
bind-key Right select-pane -R

# New window with default path set to last path
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
